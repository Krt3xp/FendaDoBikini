# Docker Compose — Split Lab (Fenda do Biquíni)

services:
  postgres:
    image: postgres:16-alpine
    container_name: fendadobikini-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fendadobikini}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fendadobikini}
      POSTGRES_DB: ${POSTGRES_DB:-fendadobikini}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fendadobikini -d fendadobikini"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fendadobikini-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-fendadobikini}:${POSTGRES_PASSWORD:-fendadobikini}@postgres:5432/${POSTGRES_DB:-fendadobikini}"
      AUTH_SECRET: "${AUTH_SECRET:-}"
    ports:
      - "8000:8000"
    volumes:
      - shared_uploads:/app/public/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fendadobikini-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "3000:3000"
    volumes:
      - shared_uploads:/app/public/uploads

volumes:
  postgres_data:
  shared_uploads:
